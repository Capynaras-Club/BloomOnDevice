; PlatformIO project for ESP32-C3 baby stats display
;
; Board:           ESP32-C3-DevKitM-1
; Flash:           4MB
; Partition:       default (with spiffs-named partition, formatted as LittleFS)
; Upload speed:    921600
;
; Platform pinned to espressif32 6.x (arduino-esp32 v2.x). Do not bump to 7.x
; without auditing the ledc API and other deprecations.

[env:esp32-c3-devkitm-1]
platform        = espressif32@^6.10.0
board           = esp32-c3-devkitm-1
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

board_build.partitions = default.csv
board_build.filesystem = littlefs

lib_deps =
  adafruit/Adafruit GFX Library@^1.11.9
  adafruit/Adafruit ILI9341@^1.6.0
  paulstoffregen/XPT2046_Touchscreen@^1.4
  bblanchon/ArduinoJson@^7.0.4
  tzapu/WiFiManager@^2.0.17

build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
