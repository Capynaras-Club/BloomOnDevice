; PlatformIO project for Baby Stats Display on Sunton ESP32-2432S024R
; ("CYD 2.4 resistive" — ESP32-WROOM-32, ILI9341 240x320, XPT2046 touch).
;
; Board:           Sunton ESP32-2432S024R (esp32dev)
; Flash:           4MB
; Partition:       default (with spiffs-named partition, formatted as LittleFS)
; Upload speed:    921600 over the on-board CH340C
;
; Platform pinned to espressif32 6.x (arduino-esp32 v2.x). Do not bump to 7.x
; without auditing the ledc API and other deprecations.

[env:esp32-2432S024R]
platform        = espressif32@^6.10.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

board_build.partitions = default.csv
board_build.filesystem = littlefs

lib_deps =
  adafruit/Adafruit GFX Library@^1.11.9
  adafruit/Adafruit ILI9341@^1.6.0
  ; XPT2046_Touchscreen doesn't tag semver in the PIO registry; pull
  ; from upstream by commit-pinnable git URL instead.
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
  bblanchon/ArduinoJson@^7.0.4
  https://github.com/tzapu/WiFiManager.git#v2.0.17

build_flags =
  -DCORE_DEBUG_LEVEL=1
