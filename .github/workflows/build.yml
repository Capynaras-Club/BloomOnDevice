name: build

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

jobs:
  firmware:
    name: Compile firmware (esp32-c3-devkitm-1)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO state
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build
        run: pio run -e esp32-c3-devkitm-1

      - name: Report sizes
        run: pio run -e esp32-c3-devkitm-1 --target size

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32-c3
          path: |
            .pio/build/esp32-c3-devkitm-1/firmware.bin
            .pio/build/esp32-c3-devkitm-1/firmware.elf
            .pio/build/esp32-c3-devkitm-1/bootloader.bin
            .pio/build/esp32-c3-devkitm-1/partitions.bin
          if-no-files-found: error
