name: release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Pages deploy needs id-token to mint the deploy token, pages: write to
# publish, contents: write to push tags + create releases.
permissions:
  contents: write
  pages: write
  id-token: write

# A single concurrency group prevents two pushes-to-main from racing the
# `nightly` tag and the Pages deploy.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  firmware:
    name: Build and publish firmware
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO state
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build
        run: pio run -e esp32-c3-devkitm-1

      - name: Stage firmware artifacts
        run: |
          mkdir -p release
          cp .pio/build/esp32-c3-devkitm-1/firmware.bin   release/
          cp .pio/build/esp32-c3-devkitm-1/firmware.elf   release/
          cp .pio/build/esp32-c3-devkitm-1/bootloader.bin release/
          cp .pio/build/esp32-c3-devkitm-1/partitions.bin release/
          ( cd release && sha256sum * > SHA256SUMS )
          ls -la release

      # ---------------------------------------------------------------
      # GitHub Releases
      # ---------------------------------------------------------------
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Move nightly tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Publish nightly pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build (main @ ${{ github.sha }})"
          body: |
            Automated build of `main` at commit ${{ github.sha }}.
            This tag is moved on every push to `main`.
          prerelease: true
          make_latest: false
          files: release/*
          fail_on_unmatched_files: true

      # ---------------------------------------------------------------
      # GitHub Pages — installer page + firmware co-located so the
      # ESP Web Tools manifest's relative `firmware/*.bin` paths resolve.
      # ---------------------------------------------------------------
      - name: Stage Pages site
        run: |
          mkdir -p pages-site/firmware
          cp -r docs/install/. pages-site/
          cp release/firmware.bin   pages-site/firmware/
          cp release/bootloader.bin pages-site/firmware/
          cp release/partitions.bin pages-site/firmware/
          ls -la pages-site pages-site/firmware

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
