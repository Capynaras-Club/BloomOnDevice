name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What's missing or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A rough sketch of the change. Mention any hardware impact (pins, partitions, current draw).

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
